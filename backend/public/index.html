<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Shortener</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="container">
    <h1>Shorten a long link</h1>
    <h3 id="title-2">Enter the link you want to shorten:</h3>
    <input type="url" class="hook_url" placeholder="Example: https://example.com/url" id="url" tabindex="50" data-form-type="website">
    <button id="sendButton">Get short link</button>
    <div id="inputContainer"></div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script src="index.js"></script>
</body>

</html>
